name: CodeStream CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Môi trường triển khai thủ công"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  security-events: write

concurrency:
  group: codestream-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage1_ci_build_test:
    name: Giai đoạn 1 - Build và Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source code
        run: npm run lint

      - name: Run unit test + coverage
        run: npm run test:coverage

      - name: Build artifact
        run: npm run build

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/build-info.json

  stage1_security_checks:
    name: Giai đoạn 1 - Kiểm thử bảo mật
    runs-on: ubuntu-latest
    needs: stage1_ci_build_test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  stage1_integration_test:
    name: Giai đoạn 1 - Integration Test API
    runs-on: ubuntu-latest
    needs: stage1_ci_build_test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start app and smoke test API
        shell: bash
        run: |
          node src/server.js &
          APP_PID=$!
          trap "kill $APP_PID" EXIT
          sleep 3
          curl --fail http://127.0.0.1:3000/health | tee health.json
          curl --fail http://127.0.0.1:3000/api/v1/message | tee message.json
          grep -q '"status":"ok"' health.json
          grep -q '"title":"CodeStream CI/CD demo"' message.json

  stage2_deploy_staging:
    name: Giai đoạn 2 - Deploy Staging
    runs-on: ubuntu-latest
    needs: [stage1_security_checks, stage1_integration_test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy mock to staging
        run: npm run deploy:mock
        env:
          DEPLOY_ENV: staging

      - name: UAT notification
        run: 'echo "UAT Notification: Staging deploy completed, waiting for business confirmation."'

      - name: Upload staging deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-staging
          path: dist/deploy-log.json

  stage2_verify_staging:
    name: Giai đoạn 2 - Xác nhận Staging
    runs-on: ubuntu-latest
    needs: stage2_deploy_staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify staging log
        shell: bash
        run: |
          test -f dist/deploy-log.json || echo "Log sẽ có trong artifact của job deploy staging"

  stage3_deploy_production:
    name: Giai đoạn 3 - Deploy Production theo Tag
    runs-on: ubuntu-latest
    needs: [stage1_security_checks, stage1_integration_test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy mock to production
        run: npm run deploy:mock
        env:
          DEPLOY_ENV: production

      - name: Upload production deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-production
          path: dist/deploy-log.json

  stage3_rollback_if_failed:
    name: Giai đoạn 3 - Rollback khi lỗi Production
    runs-on: ubuntu-latest
    needs: stage3_deploy_production
    if: failure() && needs.stage3_deploy_production.result == 'failure'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rollback mock
        run: npm run deploy:rollback
        env:
          DEPLOY_ENV: production
          ROLLBACK_REASON: production-deploy-failed

      - name: Upload rollback log
        uses: actions/upload-artifact@v4
        with:
          name: rollback-log-production
          path: dist/rollback-log.json

  manual_deploy:
    name: Triển khai thủ công từ UI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.deploy_environment }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy theo môi trường chọn từ UI
        run: npm run deploy:mock
        env:
          DEPLOY_ENV: ${{ inputs.deploy_environment }}

      - name: Upload manual deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-manual
          path: dist/deploy-log.json

  pipeline_summary:
    name: Tổng hợp kết quả pipeline
    runs-on: ubuntu-latest
    if: always()
    needs:
      - stage1_ci_build_test
      - stage1_security_checks
      - stage1_integration_test
      - stage2_deploy_staging
      - stage2_verify_staging
      - stage3_deploy_production
      - stage3_rollback_if_failed
      - manual_deploy

    steps:
      - name: Write summary
        run: |
          echo "## CodeStream CI/CD Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage1_ci_build_test: ${{ needs.stage1_ci_build_test.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage1_security_checks: ${{ needs.stage1_security_checks.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage1_integration_test: ${{ needs.stage1_integration_test.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage2_deploy_staging: ${{ needs.stage2_deploy_staging.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage2_verify_staging: ${{ needs.stage2_verify_staging.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage3_deploy_production: ${{ needs.stage3_deploy_production.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- stage3_rollback_if_failed: ${{ needs.stage3_rollback_if_failed.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- manual_deploy: ${{ needs.manual_deploy.result }}" >> "$GITHUB_STEP_SUMMARY"
