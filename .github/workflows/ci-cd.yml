name: CodeStream CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Environment to deploy manually"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (CI mode)
        run: npm run test:ci

      - name: Build artifact
        run: npm run build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: junit.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/build-info.json

  deploy_staging:
    name: Deploy Mock Staging
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy mock to staging
        run: npm run deploy:mock
        env:
          DEPLOY_ENV: staging

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-staging
          path: dist/deploy-log.json

  deploy_production_tag:
    name: Deploy Mock Production (Tag)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy mock to production
        run: npm run deploy:mock
        env:
          DEPLOY_ENV: production

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-production
          path: dist/deploy-log.json

  deploy_manual:
    name: Manual Deploy From UI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy mock to selected environment
        run: npm run deploy:mock
        env:
          DEPLOY_ENV: ${{ inputs.deploy_environment }}

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-manual
          path: dist/deploy-log.json
