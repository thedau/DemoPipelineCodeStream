image: node:20

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - test
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

before_script:
  - npm ci

lint_job:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - npm run lint

unit_test_job:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  variables:
    JEST_JUNIT_OUTPUT_DIR: reports
    JEST_JUNIT_OUTPUT_NAME: junit.xml
  script:
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - reports/junit.xml
    expire_in: 1 day

build_job:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - npm run build
  artifacts:
    paths:
      - dist/build-info.json
    expire_in: 1 day

deploy_staging_job:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm run deploy:mock
  variables:
    DEPLOY_ENV: staging
  artifacts:
    paths:
      - dist/deploy-log.json
    expire_in: 1 day

deploy_production_manual:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - npm run deploy:mock
  variables:
    DEPLOY_ENV: production
  when: manual
  allow_failure: false
